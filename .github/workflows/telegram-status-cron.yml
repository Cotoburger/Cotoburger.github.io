name: Telegram Status Cron

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  update-telegram-message:
    runs-on: ubuntu-latest

    steps:
      - name: Debug trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "run_id=${{ github.run_id }}"
          date -u

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Update Telegram channel message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          BOT_TIMEZONE: Asia/Kamchatka
          MENU_FILE_PATH: Schoolnew/foodmenu.txt
        run: python .github/scripts/update_telegram_status.py
